<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グループ別受講者名簿 | マーケティングII 2026年度</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #1A1A2E;
    --surface: #22223f;
    --surface2: #2a2a4a;
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.15);
    --teal: #2D6068;
    --teal-light: #3a7a85;
    --cream: #F5F2EC;
    --cream-dim: rgba(245,242,236,0.6);
    --muted: rgba(245,242,236,0.35);
    --border: rgba(201,168,76,0.2);
    --danger: #c0392b;
    --success: #27ae60;
    --radius: 6px;
    --font: 'Noto Sans JP', 'Calibri', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0f0f22 0%, var(--teal) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo-mark {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--bg);
    letter-spacing: -0.5px; flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.05em; }
  header h1 small { display: block; font-size: 11px; color: var(--gold); font-weight: 300; letter-spacing: 0.1em; margin-top: 1px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .tab-btn {
    padding: 12px 20px;
    background: none; border: none;
    color: var(--muted);
    font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer; position: relative;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-btn:hover:not(.active) { color: var(--cream-dim); }

  /* ── Layout ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: flex; flex: 1; }

  /* ════════════════════════════════
     TAB 1: 名簿
  ════════════════════════════════ */
  #tab-roster {
    flex-direction: row;
    height: calc(100vh - 110px);
  }

  /* Sidebar */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--gold); text-transform: uppercase;
  }
  .group-list { flex: 1; overflow-y: auto; padding: 8px; }
  .group-item {
    padding: 10px 12px; border-radius: var(--radius);
    cursor: pointer; display: flex; align-items: center;
    gap: 8px; font-size: 13px; transition: background 0.15s;
    border: 1px solid transparent;
  }
  .group-item:hover { background: var(--gold-dim); }
  .group-item.active { background: var(--gold-dim); border-color: var(--gold); }
  .group-item .badge {
    margin-left: auto; font-size: 11px;
    background: var(--teal); color: var(--cream);
    border-radius: 10px; padding: 1px 7px; min-width: 22px; text-align: center;
  }
  .sidebar-actions { padding: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }

  /* Main roster area */
  .roster-main {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .roster-header {
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 14px;
  }
  .roster-header h2 { font-size: 18px; font-weight: 500; }
  .roster-header .count { font-size: 13px; color: var(--gold); }

  .students-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
  }
  .student-card {
    background: var(--surface2); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 12px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s;
  }
  .student-card:hover { border-color: var(--gold); }
  .student-card .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--teal); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    color: var(--cream);
  }
  .student-name {
    font-size: 13px; font-weight: 400; cursor: pointer;
    border: none; background: none; color: var(--cream);
    font-family: var(--font); width: 100%; outline: none;
    border-radius: 3px; padding: 1px 2px;
  }
  .student-name:focus { background: var(--gold-dim); outline: 1px solid var(--gold); }
  .del-student {
    margin-left: auto; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 16px; flex-shrink: 0;
    line-height: 1; padding: 2px 4px; border-radius: 3px; transition: color 0.15s;
  }
  .del-student:hover { color: var(--danger); }

  /* ════════════════════════════════
     TAB 2: レポート
  ════════════════════════════════ */
  #tab-report {
    flex-direction: column;
    height: calc(100vh - 110px);
    overflow: hidden;
  }
  .report-toolbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .report-toolbar label { font-size: 12px; color: var(--muted); }
  .report-toolbar select {
    background: var(--surface2); color: var(--cream);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 10px; font-size: 13px; font-family: var(--font);
  }
  .report-info {
    margin-left: auto; font-size: 12px; color: var(--muted);
  }
  .export-btn {
    padding: 6px 14px; border-radius: var(--radius);
    background: var(--teal); color: var(--cream);
    border: none; font-family: var(--font); font-size: 12px;
    cursor: pointer; transition: background 0.15s;
  }
  .export-btn:hover { background: var(--teal-light); }

  .table-wrapper {
    flex: 1; overflow: auto; padding: 0;
  }

  /* Sticky table */
  #report-table {
    border-collapse: separate; border-spacing: 0;
    font-size: 12px; white-space: nowrap;
    min-width: max-content;
  }
  #report-table th, #report-table td {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Sticky first two cols */
  #report-table th:nth-child(1), #report-table td:nth-child(1) {
    position: sticky; left: 0; z-index: 3; min-width: 48px; text-align: center;
  }
  #report-table th:nth-child(2), #report-table td:nth-child(2) {
    position: sticky; left: 48px; z-index: 3; min-width: 130px;
  }

  #report-table thead tr:nth-child(1) th {
    position: sticky; top: 0; z-index: 4;
    background: #0f0f22; color: var(--gold);
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    padding: 10px 12px; text-align: center;
    border-bottom: 2px solid var(--gold);
  }
  #report-table thead tr:nth-child(1) th:nth-child(1),
  #report-table thead tr:nth-child(1) th:nth-child(2) {
    z-index: 5;
  }

  #report-table thead tr:nth-child(2) th {
    position: sticky; top: 41px; z-index: 4;
    background: var(--surface); color: var(--cream-dim);
    font-size: 10px; font-weight: 400;
    padding: 6px 4px; text-align: center;
    border-bottom: 1px solid var(--border);
    min-width: 72px;
  }
  #report-table thead tr:nth-child(2) th:nth-child(1),
  #report-table thead tr:nth-child(2) th:nth-child(2) {
    z-index: 5;
  }

  #report-table tbody td {
    background: var(--bg);
    padding: 0; vertical-align: middle;
  }
  #report-table tbody tr:hover td { background: rgba(201,168,76,0.05); }

  /* No. cell */
  td.cell-no {
    background: var(--surface) !important;
    color: var(--muted); font-size: 11px; text-align: center;
    padding: 6px 4px;
  }
  /* Name cell */
  td.cell-name {
    background: var(--surface) !important;
    padding: 4px 10px; font-size: 13px;
    border-right: 2px solid var(--border) !important;
  }
  td.cell-name span {
    display: block;
    color: var(--cream);
  }
  td.cell-name small {
    color: var(--muted); font-size: 10px;
  }

  /* Date cell */
  td.cell-date {
    text-align: center; cursor: pointer;
  }
  td.cell-date .date-inner {
    min-height: 36px; display: flex; align-items: center; justify-content: center;
    padding: 2px 4px;
  }
  td.cell-date:hover .date-inner { background: var(--gold-dim); }
  td.cell-date.submitted .date-inner {
    color: var(--gold); font-size: 11px; font-weight: 500;
  }
  td.cell-date.empty .date-inner { color: var(--muted); font-size: 18px; }
  td.cell-date.late .date-inner { color: #e67e22; }

  /* Date input overlay */
  .date-input-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 2px;
  }
  .date-input-wrap input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--gold);
    border-radius: 3px;
    color: var(--cream);
    font-family: var(--font); font-size: 11px;
    padding: 3px 4px;
    width: 110px;
    outline: none;
  }
  .date-input-wrap input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8) sepia(1) saturate(2) hue-rotate(5deg);
    cursor: pointer;
  }

  /* Group header rows */
  tr.group-header td {
    background: var(--surface2) !important;
    color: var(--gold); font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; padding: 6px 10px;
  }

  /* Summary row */
  tr.summary-row td {
    background: rgba(45,96,104,0.3) !important;
    text-align: center; font-size: 11px; color: var(--teal-light);
    padding: 5px 4px; font-weight: 500;
  }
  tr.summary-row td.cell-no, tr.summary-row td.cell-name {
    color: var(--muted); background: rgba(45,96,104,0.3) !important;
  }

  /* ── Shared Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius);
    font-family: var(--font); font-size: 13px; cursor: pointer;
    border: none; transition: all 0.15s; font-weight: 500;
  }
  .btn-gold { background: var(--gold); color: var(--bg); }
  .btn-gold:hover { background: #d4b05a; }
  .btn-outline {
    background: none; border: 1px solid var(--border); color: var(--cream-dim);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-teal { background: var(--teal); color: var(--cream); }
  .btn-teal:hover { background: var(--teal-light); }
  .btn-danger { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
  .btn-danger:hover { background: rgba(192,57,43,0.35); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--teal); color: var(--cream);
    padding: 10px 18px; border-radius: var(--radius);
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.3s; z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 3px; }
  ::-webkit-scrollbar-corner { background: var(--bg); }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; width: 340px; max-width: 90vw;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--gold); }
  .modal input[type="text"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    color: var(--cream); font-family: var(--font); font-size: 14px;
    outline: none; margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--gold); }
  .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* Footer */
  footer {
    text-align: center; padding: 12px;
    font-size: 11px; color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  /* Empty state */
  .empty-state {
    padding: 48px; text-align: center; color: var(--muted);
    font-size: 14px; line-height: 2;
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">DL</div>
  <h1>
    グループ別受講者名簿
    <small>Marketing II 2026  ／  岩崎学園  ／  DESIGN LAB Co., Ltd.</small>
  </h1>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('roster')">📋 名簿</button>
  <button class="tab-btn" onclick="switchTab('report')">📅 レポート提出</button>
</div>

<!-- ═══════════════════ TAB: 名簿 ═══════════════════ -->
<div id="tab-roster" class="tab-panel active">

  <div class="sidebar">
    <div class="sidebar-header">グループ一覧</div>
    <div class="group-list" id="group-list"></div>
    <div class="sidebar-actions">
      <button class="btn btn-gold" onclick="openAddGroupModal()">＋ グループを追加</button>
      <button class="btn btn-outline" onclick="openAddIndividualModal()">個人受講を追加</button>
    </div>
  </div>

  <div class="roster-main">
    <div class="roster-header">
      <h2 id="selected-group-name">グループを選択してください</h2>
      <span class="count" id="selected-count"></span>
      <div style="margin-left:auto;display:flex;gap:8px;" id="roster-actions" style="display:none"></div>
    </div>
    <div id="students-container"></div>
  </div>
</div>

<!-- ═══════════════════ TAB: レポート ═══════════════════ -->
<div id="tab-report" class="tab-panel">
  <div class="report-toolbar">
    <label>表示グループ：</label>
    <select id="report-group-filter" onchange="renderReportTable()">
      <option value="all">すべて</option>
    </select>
    <span class="report-info" id="report-info"></span>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="export-btn" onclick="exportCSV()">⬇ CSV出力</button>
      <button class="export-btn" onclick="clearSelectedGroup()">🗑 選択グループをクリア</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table id="report-table">
      <thead>
        <tr id="thead-top"></tr>
        <tr id="thead-sub"></tr>
      </thead>
      <tbody id="report-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modals -->
<div class="modal-backdrop" id="modal-add-group">
  <div class="modal">
    <h3>グループを追加</h3>
    <input type="text" id="new-group-name" placeholder="グループ名（例：Aグループ）" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-group')">キャンセル</button>
      <button class="btn btn-gold" onclick="addGroup()">追加</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-add-individual">
  <div class="modal">
    <h3>個人受講者を追加</h3>
    <input type="text" id="new-individual-name" placeholder="氏名" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-individual')">キャンセル</button>
      <button class="btn btn-gold" onclick="addIndividual()">追加</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-add-student">
  <div class="modal">
    <h3>受講者を追加</h3>
    <input type="text" id="new-student-name" placeholder="氏名" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-student')">キャンセル</button>
      <button class="btn btn-gold" onclick="addStudentToGroup()">追加</button>
    </div>
  </div>
</div>

<div id="toast">保存しました</div>

<footer>マーケティングII 2026年度 ｜ 岩崎学園 ｜ DESIGN LAB Co., Ltd.　—　データはこのブラウザに保存されます</footer>

<script>
// ────────────────────────────────────────────────────────
//  Data Model
//  {
//    groups: [ { id, name, students: [{id, name}] } ],
//    individuals: [ {id, name} ],
//    reports: { studentId: { 1: "YYYY-MM-DD", 2: "...", ... } }
//  }
// ────────────────────────────────────────────────────────

const STORAGE_KEY = 'marketing2-roster-v2';
const REPORT_SESSIONS = 30;

let data = load();
let selectedGroupId = null;
let activeStudentGroupId = null; // for add-student modal

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { groups: [], individuals: [], reports: {} };
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showToast();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── Toast ──
let toastTimer;
function showToast(msg='保存しました') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Tab Switch ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='roster') || (i===1 && tab==='report'));
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'report') { populateReportFilter(); renderReportTable(); }
}

// ════════════════════════════════
//  ROSTER TAB
// ════════════════════════════════

function renderSidebar() {
  const list = document.getElementById('group-list');
  list.innerHTML = '';

  // Individual
  const indItem = document.createElement('div');
  indItem.className = 'group-item' + (selectedGroupId === '__individual__' ? ' active' : '');
  indItem.innerHTML = `<span>個人受講</span><span class="badge">${data.individuals.length}</span>`;
  indItem.onclick = () => selectGroup('__individual__');
  list.appendChild(indItem);

  data.groups.forEach(g => {
    const el = document.createElement('div');
    el.className = 'group-item' + (selectedGroupId === g.id ? ' active' : '');
    el.innerHTML = `<span>${g.name}</span><span class="badge">${g.students.length}</span>`;
    el.onclick = () => selectGroup(g.id);
    list.appendChild(el);
  });
}

function selectGroup(gid) {
  selectedGroupId = gid;
  renderSidebar();
  renderStudents();
}

function renderStudents() {
  const container = document.getElementById('students-container');
  const nameEl = document.getElementById('selected-group-name');
  const countEl = document.getElementById('selected-count');
  const actionsEl = document.getElementById('roster-actions');

  if (!selectedGroupId) {
    container.innerHTML = '<div class="empty-state">← グループを選択してください</div>';
    nameEl.textContent = 'グループを選択してください';
    countEl.textContent = '';
    actionsEl.innerHTML = '';
    return;
  }

  let students, groupName;
  if (selectedGroupId === '__individual__') {
    students = data.individuals;
    groupName = '個人受講';
  } else {
    const g = data.groups.find(g => g.id === selectedGroupId);
    if (!g) return;
    students = g.students;
    groupName = g.name;
  }

  nameEl.textContent = groupName;
  countEl.textContent = `受講者 ${students.length} 名`;

  actionsEl.innerHTML = `
    <button class="btn btn-teal" onclick="openAddStudentModal('${selectedGroupId}')">＋ 受講者を追加</button>
    ${selectedGroupId !== '__individual__' ? `<button class="btn btn-danger" onclick="deleteGroup('${selectedGroupId}')">グループを削除</button>` : ''}
  `;

  if (students.length === 0) {
    container.innerHTML = '<div class="empty-state">受講者がいません。<br>「受講者を追加」から追加してください。</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'students-grid';

  students.forEach(s => {
    const card = document.createElement('div');
    card.className = 'student-card';

    const initials = s.name ? s.name.charAt(0) : '？';
    card.innerHTML = `
      <div class="avatar">${initials}</div>
      <input class="student-name" value="${escHtml(s.name)}" title="クリックで編集"
        onchange="updateStudentName('${s.id}', this.value)"
        onblur="updateStudentName('${s.id}', this.value)" />
      <button class="del-student" title="削除" onclick="deleteStudent('${s.id}')">×</button>
    `;
    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function updateStudentName(sid, val) {
  val = val.trim();
  if (!val) return;
  // search in all groups + individuals
  for (const g of data.groups) {
    const s = g.students.find(s => s.id === sid);
    if (s) { s.name = val; save(); return; }
  }
  const ind = data.individuals.find(s => s.id === sid);
  if (ind) { ind.name = val; save(); }
}

function deleteStudent(sid) {
  if (!confirm('この受講者を削除しますか？')) return;
  for (const g of data.groups) {
    const idx = g.students.findIndex(s => s.id === sid);
    if (idx !== -1) { g.students.splice(idx, 1); }
  }
  const idx = data.individuals.findIndex(s => s.id === sid);
  if (idx !== -1) data.individuals.splice(idx, 1);
  delete data.reports[sid];
  save();
  renderSidebar();
  renderStudents();
}

function deleteGroup(gid) {
  if (!confirm('このグループを削除しますか？（受講者のレポートデータも削除されます）')) return;
  const g = data.groups.find(g => g.id === gid);
  if (g) g.students.forEach(s => delete data.reports[s.id]);
  data.groups = data.groups.filter(g => g.id !== gid);
  selectedGroupId = null;
  save();
  renderSidebar();
  renderStudents();
}

// ── Modals ──
function openAddGroupModal() {
  document.getElementById('new-group-name').value = '';
  document.getElementById('modal-add-group').classList.add('open');
  setTimeout(() => document.getElementById('new-group-name').focus(), 50);
}
function openAddIndividualModal() {
  document.getElementById('new-individual-name').value = '';
  document.getElementById('modal-add-individual').classList.add('open');
  setTimeout(() => document.getElementById('new-individual-name').focus(), 50);
}
function openAddStudentModal(gid) {
  activeStudentGroupId = gid;
  document.getElementById('new-student-name').value = '';
  document.getElementById('modal-add-student').classList.add('open');
  setTimeout(() => document.getElementById('new-student-name').focus(), 50);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function addGroup() {
  const name = document.getElementById('new-group-name').value.trim();
  if (!name) return;
  data.groups.push({ id: uid(), name, students: [] });
  save(); closeModal('modal-add-group');
  renderSidebar();
}
function addIndividual() {
  const name = document.getElementById('new-individual-name').value.trim();
  if (!name) return;
  data.individuals.push({ id: uid(), name });
  save(); closeModal('modal-add-individual');
  renderSidebar();
  if (selectedGroupId === '__individual__') renderStudents();
}
function addStudentToGroup() {
  const name = document.getElementById('new-student-name').value.trim();
  if (!name) return;
  const target = activeStudentGroupId === '__individual__' ? data.individuals
    : (data.groups.find(g => g.id === activeStudentGroupId)?.students);
  if (!target) return;
  target.push({ id: uid(), name });
  save(); closeModal('modal-add-student');
  renderSidebar(); renderStudents();
}

// Enter key in modals
document.getElementById('new-group-name').addEventListener('keydown', e => { if(e.key==='Enter') addGroup(); });
document.getElementById('new-individual-name').addEventListener('keydown', e => { if(e.key==='Enter') addIndividual(); });
document.getElementById('new-student-name').addEventListener('keydown', e => { if(e.key==='Enter') addStudentToGroup(); });

// ════════════════════════════════
//  REPORT TAB
// ════════════════════════════════

function getAllStudentsWithGroup() {
  const result = [];
  if (data.individuals.length > 0) {
    data.individuals.forEach(s => result.push({ ...s, groupName: '個人受講', groupId: '__individual__' }));
  }
  data.groups.forEach(g => {
    g.students.forEach(s => result.push({ ...s, groupName: g.name, groupId: g.id }));
  });
  return result;
}

function populateReportFilter() {
  const sel = document.getElementById('report-group-filter');
  const prev = sel.value;
  sel.innerHTML = '<option value="all">すべて</option>';
  if (data.individuals.length > 0) {
    const o = document.createElement('option');
    o.value = '__individual__'; o.textContent = '個人受講';
    sel.appendChild(o);
  }
  data.groups.forEach(g => {
    const o = document.createElement('option');
    o.value = g.id; o.textContent = g.name;
    sel.appendChild(o);
  });
  sel.value = prev || 'all';
}

function renderReportTable() {
  const filter = document.getElementById('report-group-filter').value;
  let students = getAllStudentsWithGroup();
  if (filter !== 'all') students = students.filter(s => s.groupId === filter);

  // Header row 1
  const thead1 = document.getElementById('thead-top');
  const thead2 = document.getElementById('thead-sub');
  thead1.innerHTML = '';
  thead2.innerHTML = '';

  // No. col
  const th1No = document.createElement('th'); th1No.textContent = 'No.'; th1No.rowSpan = 2;
  // Name col
  const th1Name = document.createElement('th'); th1Name.textContent = '氏名 / グループ'; th1Name.rowSpan = 2;
  // Report header spanning all 30
  const th1Rep = document.createElement('th');
  th1Rep.colSpan = REPORT_SESSIONS;
  th1Rep.textContent = 'レポート提出日（第1回〜第30回）';

  thead1.appendChild(th1No);
  thead1.appendChild(th1Name);
  thead1.appendChild(th1Rep);

  // Sub headers: 第N回
  const th2No = document.createElement('th'); th2No.style.display='none'; // already merged
  const th2Name = document.createElement('th'); th2Name.style.display='none';
  for (let i = 1; i <= REPORT_SESSIONS; i++) {
    const th = document.createElement('th');
    th.textContent = `第${i}回`;
    thead2.appendChild(th);
  }

  // Tbody
  const tbody = document.getElementById('report-tbody');
  tbody.innerHTML = '';

  if (students.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td'); td.colSpan = REPORT_SESSIONS + 2;
    td.style.textAlign = 'center'; td.style.padding = '40px'; td.style.color = 'var(--muted)';
    td.textContent = '表示する受講者がいません。名簿タブからグループ・受講者を追加してください。';
    tr.appendChild(td); tbody.appendChild(tr);
    document.getElementById('report-info').textContent = '';
    return;
  }

  // Group by groupId if showing all
  let rowIndex = 1;
  let prevGroup = null;

  students.forEach(s => {
    // Group header
    if (s.groupId !== prevGroup && filter === 'all') {
      const tr = document.createElement('tr');
      tr.className = 'group-header';
      const td = document.createElement('td'); td.colSpan = REPORT_SESSIONS + 2;
      td.textContent = '▸ ' + s.groupName;
      tr.appendChild(td); tbody.appendChild(tr);
      prevGroup = s.groupId;
    }

    const tr = document.createElement('tr');
    // No cell
    const tdNo = document.createElement('td'); tdNo.className = 'cell-no'; tdNo.textContent = rowIndex++;
    // Name cell
    const tdName = document.createElement('td'); tdName.className = 'cell-name';
    tdName.innerHTML = `<span>${escHtml(s.name)}</span>${filter==='all'?`<small>${escHtml(s.groupName)}</small>`:''}`;

    tr.appendChild(tdNo);
    tr.appendChild(tdName);

    const reports = data.reports[s.id] || {};
    for (let i = 1; i <= REPORT_SESSIONS; i++) {
      const td = document.createElement('td');
      td.className = 'cell-date';
      const dateVal = reports[i] || '';
      renderDateCell(td, s.id, i, dateVal);
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  });

  // Summary row
  const sumTr = document.createElement('tr');
  sumTr.className = 'summary-row';
  const sumNo = document.createElement('td'); sumNo.className = 'cell-no'; sumNo.textContent = '提出数';
  const sumName = document.createElement('td'); sumName.className = 'cell-name'; sumName.textContent = '（各回の提出者数）';
  sumTr.appendChild(sumNo);
  sumTr.appendChild(sumName);
  for (let i = 1; i <= REPORT_SESSIONS; i++) {
    const td = document.createElement('td');
    const count = students.filter(s => data.reports[s.id]?.[i]).length;
    td.textContent = count > 0 ? `${count}名` : '—';
    if (count === students.length && students.length > 0) td.style.color = 'var(--gold)';
    sumTr.appendChild(td);
  }
  tbody.appendChild(sumTr);

  // Count submitted
  let totalCells = students.length * REPORT_SESSIONS;
  let filled = 0;
  students.forEach(s => { const r = data.reports[s.id] || {}; filled += Object.keys(r).length; });
  document.getElementById('report-info').textContent =
    `${students.length}名 ／ 提出記録 ${filled} / ${totalCells}`;
}

function renderDateCell(td, sid, session, dateVal) {
  td.innerHTML = '';
  if (dateVal) {
    // Show date — clicking switches to input
    td.className = 'cell-date submitted';
    const inner = document.createElement('div');
    inner.className = 'date-inner';
    // Format: M/D
    const [y,m,d] = dateVal.split('-');
    inner.textContent = `${parseInt(m)}/${parseInt(d)}`;
    inner.title = dateVal + ' クリックで変更 / 右クリックで削除';
    inner.onclick = () => openDateInput(td, sid, session, dateVal);
    inner.oncontextmenu = (e) => { e.preventDefault(); clearDate(td, sid, session); };
    td.appendChild(inner);
  } else {
    td.className = 'cell-date empty';
    const inner = document.createElement('div');
    inner.className = 'date-inner';
    inner.textContent = '·';
    inner.title = 'クリックして提出日を入力';
    inner.onclick = () => openDateInput(td, sid, session, '');
    td.appendChild(inner);
  }
}

function openDateInput(td, sid, session, current) {
  td.innerHTML = '';
  td.className = 'cell-date';
  const wrap = document.createElement('div');
  wrap.className = 'date-input-wrap';
  const inp = document.createElement('input');
  inp.type = 'date';
  inp.value = current;
  inp.style.width = '116px';

  const today = new Date().toISOString().slice(0,10);
  if (!current) inp.value = today;

  inp.onchange = () => {
    const v = inp.value;
    if (!data.reports[sid]) data.reports[sid] = {};
    if (v) data.reports[sid][session] = v;
    else delete data.reports[sid][session];
    save();
    renderDateCell(td, sid, session, v);
    // update summary
    updateSummaryRow();
  };
  inp.onblur = () => {
    const v = inp.value;
    if (!v && !current) { renderDateCell(td, sid, session, ''); return; }
    if (!data.reports[sid]) data.reports[sid] = {};
    if (v) data.reports[sid][session] = v;
    save();
    renderDateCell(td, sid, session, v || current);
    updateSummaryRow();
  };
  inp.onkeydown = (e) => {
    if (e.key === 'Escape') { renderDateCell(td, sid, session, current); }
    if (e.key === 'Enter') { inp.blur(); }
  };
  wrap.appendChild(inp);
  td.appendChild(wrap);
  setTimeout(() => inp.showPicker?.(), 50);
}

function clearDate(td, sid, session) {
  if (!confirm('提出日を削除しますか？')) return;
  if (data.reports[sid]) delete data.reports[sid][session];
  save();
  renderDateCell(td, sid, session, '');
  updateSummaryRow();
}

function updateSummaryRow() {
  // Re-render only summary counts
  const filter = document.getElementById('report-group-filter').value;
  let students = getAllStudentsWithGroup();
  if (filter !== 'all') students = students.filter(s => s.groupId === filter);
  const sumRow = document.querySelector('tr.summary-row');
  if (!sumRow) return;
  const cells = sumRow.querySelectorAll('td');
  for (let i = 1; i <= REPORT_SESSIONS; i++) {
    const td = cells[i + 1]; // +2 for No + Name, but index starts 0
    if (!td) continue;
    const count = students.filter(s => data.reports[s.id]?.[i]).length;
    td.textContent = count > 0 ? `${count}名` : '—';
    td.style.color = (count === students.length && students.length > 0) ? 'var(--gold)' : '';
  }
  // Update info
  let filled = 0;
  students.forEach(s => { const r = data.reports[s.id] || {}; filled += Object.keys(r).length; });
  document.getElementById('report-info').textContent =
    `${students.length}名 ／ 提出記録 ${filled} / ${students.length * REPORT_SESSIONS}`;
}

function clearSelectedGroup() {
  const filter = document.getElementById('report-group-filter').value;
  if (filter === 'all') { alert('特定のグループを選択してからクリアしてください。'); return; }
  if (!confirm('選択中のグループのレポートデータをすべて削除しますか？')) return;
  let students = getAllStudentsWithGroup().filter(s => s.groupId === filter);
  students.forEach(s => { delete data.reports[s.id]; });
  save();
  renderReportTable();
}

function exportCSV() {
  const filter = document.getElementById('report-group-filter').value;
  let students = getAllStudentsWithGroup();
  if (filter !== 'all') students = students.filter(s => s.groupId === filter);

  const headers = ['No', 'グループ', '氏名'];
  for (let i = 1; i <= REPORT_SESSIONS; i++) headers.push(`第${i}回`);

  const rows = students.map((s, idx) => {
    const reports = data.reports[s.id] || {};
    const dates = [];
    for (let i = 1; i <= REPORT_SESSIONS; i++) dates.push(reports[i] || '');
    return [idx + 1, s.groupName, s.name, ...dates];
  });

  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `marketing2-reports-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
renderSidebar();
renderStudents();

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});
</script>
